services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: polymoney_pg
    environment:
      POSTGRES_USER: polymoney
      POSTGRES_PASSWORD: polymoney
      POSTGRES_DB: polymoney
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymoney"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polymoney_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  redis_data:
